<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Hole</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">


        <!-- DIV RESPONSAVEL PELA INFORMAÇÕES EXTRA -->
        <div class="slin" id="container_slin">
            <h1>HELLO MY FRIEND!</h1>
            
            <p id="conteudo_p">Aproveite seu software de controle financeiro, caso você ainda nao tenha se registrado, click logo em baixo</p>

            <button id="btn_cadastrar">CRIAR CONTA</button>
        </div>

        <!-- AREA DE LOGIN -->
        <div class="lado-esquerdo">

            <h1>Log In</h1>

            <p>Log com seu email e senha</p>

            <form id="formulario_login">
                <input type="email" placeholder="Email:" id="email" name="nome">
                <input type="password" placeholder="Senha:" id="senha" name="email">

                <button type="submit" class="btn-esquerdo">LOGIN</button>
            </form>
        </div>


        <!-- AREA PARA SE REGISTRAR -->
        <div class="lado-direito">
            <h1>Sing In</h1>

            <p>Cadastre com seu nome, email e senha</p>

            <form id="formulario_register">
                <input type="text" placeholder="Nome:" id="nome_registro">
                <input type="email" placeholder="Email:" id="email_registro">
                <input type="password" placeholder="Senha:" id="senha_registro">
                
                <button type="submit" class="btn-esquerdo" id="btn_registrar">CADASTRAR</button>
            </form>

        </div>

    </div>

<script src="js/slin.js"></script>
<script src="js/index.js"></script>
</body>
</html>
